<script>

/* OPEN FILE INSIDE PORTAL */

function openFile(file){

document.getElementById("viewer").innerHTML =
'<iframe src="'+file+'" width="100%" height="100%" style="border:none;"></iframe>';

}



/* START INVESTIGATION */

function startInvestigation(){

startFullscreen();
checkPassword();

}



/* FULLSCREEN MODE */

function startFullscreen(){

let elem=document.documentElement;

if(elem.requestFullscreen){
elem.requestFullscreen();
}

}



/* PASSWORD CLUE SYSTEM */

let messages=[
"CLUE: Check the Security Logs carefully.",
"HINT: The autopsy report reveals the real cause of death.",
"NOTE: Someone altered the access logs before midnight."
];

let index=0;

function checkPassword(){

let message=messages[index];

index++;

if(index>=messages.length){
index=0;
}

let password=prompt(message + "\n\nEnter Password:");

if(password && password.trim().toLowerCase()==="isabella cruz"){

window.location.replace("mystery.html");

}

else{

alert("Incorrect Password!");

}

}



/* MESSAGE ROTATION EVERY 5 MINUTES */

setInterval(function(){

index++;

if(index>=messages.length){
index=0;
}

},300000);



/* TAB SWITCH DETECTION */

document.addEventListener("visibilitychange",function(){

if(document.hidden){

breach();

}

});



/* DISABLE RIGHT CLICK */

document.addEventListener("contextmenu",function(e){
e.preventDefault();
});



/* BLOCK INSPECT SHORTCUTS */

document.addEventListener("keydown",function(e){

if(e.key==="F12"){
e.preventDefault();
breach();
}

if(e.ctrlKey && e.shiftKey && e.key==="I"){
e.preventDefault();
breach();
}

if(e.ctrlKey && e.key==="u"){
e.preventDefault();
breach();
}

});



/* DEVTOOLS WINDOW DETECTION */

setInterval(function(){

const widthDiff = window.outerWidth - window.innerWidth > 160;
const heightDiff = window.outerHeight - window.innerHeight > 160;

if(widthDiff || heightDiff){
breach();
}

},1000);



/* BREACH SYSTEM */

function breach(){

alert("SYSTEM ALERT: Investigation breach detected!");

document.body.innerHTML =
"<h1 style='color:red;text-align:center;margin-top:20%'>ACCESS TERMINATED</h1>";

}

</script>
