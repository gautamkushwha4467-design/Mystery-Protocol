<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Portal - Victor Sterling</title>

<style>

body{
    margin:0;
    font-family:"Courier New", monospace;
    background:#0f1720;
    color:#e2e8f0;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    margin-top:30px;
    text-align:center;
    letter-spacing:2px;
    color:#f97316;
}

.dashboard{
    margin-top:40px;
    display:grid;
    grid-template-columns: repeat(3,220px);
    gap:25px;
}

.card{
    background:#111827;
    border:1px solid #374151;
    border-radius:10px;
    padding:15px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.card:hover{
    transform:scale(1.05);
    border-color:#f97316;
    box-shadow:0 0 20px rgba(249,115,22,0.6);
}

.card img{
    width:120px;
    height:120px;
}

.card p{
    margin-top:10px;
    font-size:15px;
}

.start-btn{
    margin-top:40px;
    padding:12px 30px;
    font-size:18px;
    border:2px solid #f97316;
    background:transparent;
    color:#f97316;
    cursor:pointer;
    border-radius:6px;
    transition:0.3s;
}

.start-btn:hover{
    background:#f97316;
    color:white;
}

.footer{
    margin-top:30px;
    font-size:13px;
    color:#6b7280;
}

</style>

</head>


<body>

<h1>DETECTIVE DATABASE<br>Case: Victor Sterling</h1>


<div class="dashboard">

</a>

<img src="security.png" alt="Security">
<p>Security Logs</p>
</a>


<a href="investigator_notes.html" target="_blank" class="card">
<img src="detective.png" alt="Detective">
<p>Investigator Notes</p>
</a>


<a href="confidential_confessions.html" target="_blank" class="card">
<img src="interrogate.png" alt="Interrogate">

</a>


<a href="Autopsy_report.html" target="_blank" class="card">
<img src="report.png" alt="Report">

ACCESS FINAL FILE
