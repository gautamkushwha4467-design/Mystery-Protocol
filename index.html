<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" type="text/css" href="rain.css">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Portal</title>

<style>

body {
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:90vh;
margin:0;
}

.button-container{
display:flex;
}

.button-container:first-child{
margin-bottom:10px;
}

.image-button{
display:inline-block;
margin:10px;
cursor:pointer;
}

.normal-button{
margin-top:20px;
}

.info{
border:2px solid orange;
color:orange;
background:transparent;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

.info:hover{
background:orange;
color:white;
}

</style>

</head>

<body>

<h1>Mystery Portal<br>Victor Sterling</h1>

<div class="button-container">

<a href="newspaper.png" target="_blank" class="image-button">
<img src="news.png" alt="News" width="180" height="180">
</a>

<a href="security_access_logs.html" target="_blank" class="image-button">
<img src="security.png" alt="Security" width="180" height="180">
</a>

</div>


<div class="button-container">

<a href="investigator_notes.html" target="_blank" class="image-button">
<img src="detective.png" alt="Detective" width="180" height="200">
</a>

<a href="confidential_confessions.html" target="_blank" class="image-button">
<img src="interrogate.png" alt="Interrogate" width="180" height="200">
</a>

<a href="Autopsy_report.html" target="_blank" class="image-button">
<img src="report.png" alt="Report" width="180" height="200">
</a>

</div>


<!-- Start Button -->

<button class="info normal-button" onclick="startInvestigation()">
Lets Start
</button>


<script>

/* ---------- FULLSCREEN + PASSWORD ---------- */

function startInvestigation(){

startFullscreen();
checkPassword();

}


/* ---------- FULLSCREEN ---------- */

function startFullscreen(){

let elem=document.documentElement;

if(elem.requestFullscreen){
elem.requestFullscreen();
}

}


/* ---------- PASSWORD WITH ROTATING MESSAGE ---------- */

let messages=[
"CLUE: Check the Security Logs carefully.",
"HINT: The autopsy report reveals the real cause of death.",
"NOTE: Someone altered the access logs before midnight."
];

let index=0;

function checkPassword(){

let message=messages[index];

index++;
if(index>=messages.length){
index=0;
}

let password=prompt(message+"\n\nEnter Password:");

if(password && password.trim().toLowerCase()==="isabella cruz"){
window.location.href="mystery.html";
}

else{
alert("Incorrect Password!");
}

}


/* ---------- CHANGE MESSAGE EVERY 5 MINUTES ---------- */

setInterval(function(){

index++;

if(index>=messages.length){
index=0;
}

},300000);


/* ---------- TAB SWITCH DETECTION ---------- */

document.addEventListener("visibilitychange",function(){

if(document.hidden){

alert("SYSTEM ALERT: Investigation breach detected!");

window.location.href="about:blank";

}

});


/* ---------- DISABLE RIGHT CLICK ---------- */

document.addEventListener("contextmenu",function(e){
e.preventDefault();
});


/* ---------- BLOCK SHORTCUT KEYS ---------- */

document.addEventListener("keydown",function(e){

if(e.key==="F12"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key==="I"){
e.preventDefault();
}

if(e.ctrlKey && e.key==="u"){
e.preventDefault();
}

if(e.ctrlKey && e.key==="c"){
e.preventDefault();
}

});

</script>

</body>
</html>
